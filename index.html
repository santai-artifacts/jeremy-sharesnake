<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1420;
    --panel:#171e2e;
    --grid:#1d2740;
    --snake:#ec4899;
    --snake-head:#f9a8d4;
    --food:#fbbf24;
    --text:#e7ecf5;
    --muted:#8a96ab;
    --accent:#60a5fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Space Grotesk',system-ui,sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#1a2440,var(--bg));
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    padding:24px;
  }
  header{text-align:center}
  h1{
    font-size:clamp(28px,6vw,40px);
    font-weight:700;
    letter-spacing:-.5px;
    display:flex;align-items:center;gap:10px;justify-content:center;
  }
  h1 .dot{width:14px;height:14px;border-radius:50%;background:var(--snake);box-shadow:0 0 16px var(--snake)}
  .sub{color:var(--muted);font-size:14px;margin-top:4px}

  .scores{
    display:flex;gap:14px;width:100%;max-width:440px;
  }
  .card{
    flex:1;background:var(--panel);border:1px solid #232d44;border-radius:14px;
    padding:12px 16px;text-align:center;
  }
  .card .label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
  .card .val{font-size:26px;font-weight:700;margin-top:2px}

  .stage{position:relative;width:100%;max-width:440px;aspect-ratio:1}
  canvas{
    width:100%;height:100%;display:block;
    background:var(--panel);
    border:1px solid #232d44;
    border-radius:18px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.7);
  }
  .overlay{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:rgba(15,20,32,.82);backdrop-filter:blur(4px);
    border-radius:18px;text-align:center;padding:24px;
  }
  .overlay.hidden{display:none}
  .overlay h2{font-size:24px;font-weight:700}
  .overlay p{color:var(--muted);font-size:14px;max-width:260px}
  button{
    font-family:inherit;font-size:15px;font-weight:600;
    color:#08120b;background:var(--snake);
    border:none;border-radius:10px;padding:11px 24px;cursor:pointer;
    transition:transform .12s ease,box-shadow .12s ease;
    box-shadow:0 6px 20px -6px var(--snake);
  }
  button:hover{transform:translateY(-2px)}
  button:active{transform:translateY(0)}
  .hint{color:var(--muted);font-size:13px;text-align:center;line-height:1.6}
  .hint kbd{
    background:#222d45;border:1px solid #313d59;border-radius:5px;
    padding:1px 7px;font-family:inherit;font-size:12px;color:var(--text);
  }
  @media (prefers-reduced-motion:reduce){button{transition:none}}
</style>
</head>
<body>
  <header>
    <h1><span class="dot"></span>Worm</h1>
    <div class="sub">Eat the apples. Don't bite yourself.</div>
  </header>

  <div class="scores">
    <div class="card"><div class="label">Score</div><div class="val" id="score">0</div></div>
    <div class="card"><div class="label">Best</div><div class="val" id="best">0</div></div>
  </div>

  <div class="stage">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle">Ready to play?</h2>
      <p id="ovText">Use the arrow keys or WASD to steer. On mobile, swipe.</p>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <div class="hint">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move · <kbd>Space</kbd> to pause
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovText = document.getElementById('ovText');
  const startBtn = document.getElementById('startBtn');

  const GRID = 20;                 // cells per side
  const CELL = canvas.width / GRID; // px per cell
  const START_SPEED = 130;         // ms per step

  let snake, dir, nextDir, food, score, best = 0, speed, running, loopId;

  function reset() {
    snake = [{x: 9, y: 10}, {x: 8, y: 10}, {x: 7, y: 10}];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score = 0;
    speed = START_SPEED;
    placeFood();
    scoreEl.textContent = '0';
  }

  function placeFood() {
    // keep trying until food lands on an empty cell
    let p;
    do {
      p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // walls or self collision -> game over
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 1;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; }
      // gentle speed-up as you grow
      if (speed > 70) { speed -= 3; restartLoop(); }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,.03)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL, 0); ctx.lineTo(i*CELL, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i*CELL); ctx.lineTo(canvas.width, i*CELL); ctx.stroke();
    }

    // food with glow
    const fx = food.x*CELL + CELL/2, fy = food.y*CELL + CELL/2;
    ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 16;
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath(); ctx.arc(fx, fy, CELL/2 - 3, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // snake
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#f9a8d4' : '#ec4899';
      roundRect(s.x*CELL + 1.5, s.y*CELL + 1.5, CELL - 3, CELL - 3, 5);
      ctx.fill();
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function restartLoop() {
    clearInterval(loopId);
    loopId = setInterval(step, speed);
  }

  function start() {
    reset();
    draw();
    running = true;
    overlay.classList.add('hidden');
    restartLoop();
  }

  function gameOver() {
    running = false;
    clearInterval(loopId);
    ovTitle.textContent = 'Game Over';
    ovText.textContent = `You scored ${score}. ` + (score >= best && score > 0 ? 'New best!' : 'Try again?');
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }

  function togglePause() {
    if (overlay.classList.contains('hidden') === false && running === false && snake) return;
    if (!snake) return;
    if (running) {
      running = false;
      clearInterval(loopId);
      ovTitle.textContent = 'Paused';
      ovText.textContent = 'Press Space or tap Resume to continue.';
      startBtn.textContent = 'Resume';
      overlay.classList.remove('hidden');
    } else {
      running = true;
      overlay.classList.add('hidden');
      restartLoop();
    }
  }

  function setDir(x, y) {
    // prevent 180° reversals
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x, y };
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || ['w','a','s','d'].includes(k)) {
      e.preventDefault();
    }
    if (k === 'arrowup' || k === 'w') setDir(0, -1);
    else if (k === 'arrowdown' || k === 's') setDir(0, 1);
    else if (k === 'arrowleft' || k === 'a') setDir(-1, 0);
    else if (k === 'arrowright' || k === 'd') setDir(1, 0);
    else if (k === ' ') {
      if (!running && snake && overlay.classList.contains('hidden') === false && ovTitle.textContent === 'Game Over') start();
      else togglePause();
    }
  });

  // touch / swipe controls
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  startBtn.addEventListener('click', start);

  // initial idle frame
  reset();
  draw();
})();
</script>
</body>
</html>
